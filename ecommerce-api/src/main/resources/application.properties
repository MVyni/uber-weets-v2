spring.application.name=ecommerce-api
spring.profiles.active=dev
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
jwt.secret=${JWT_SECRET:uberweets-local-jwt-secret-change-me}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=Authorization,Content-Type,Accept,Origin,X-Requested-With
app.cors.exposed-headers=Authorization
app.cors.allow-credentials=true
